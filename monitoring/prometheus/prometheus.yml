---
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: backend-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - aml-kyt-screening:8080
          - api-gateway:8080
          - audit-event-log:8080
          - blockchain-gateway:8080
          - exchange-connectors:8080
          - fraud-detection:8080
          - fx-hedging:8080
          - identity-auth:8080
          - ledger-accounting:8080
          - liquidity-routing:8080
          - mpc-signing-service:8080
          - notification:8080
          - onboarding-kyc:8080
          - payment-orchestration:8080
          - policy-risk-engine:8080
          - pricing-quote:8080
          - rail-connectors:8080
          - reconciliation:8080
          - transaction-orchestrator:8080
          - treasury-orchestration:8080
          - wallet-management:8080
