# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Read-only HTTP layers over Postgres so Hurl E2E tests can assert on
  # data produced by the services. Each instance is published on a unique
  # host port (3000+i) so host-side Hurl can reach it; the internal name
  # is postgrest-<db>:3000. Add/remove instances in lockstep with the
  # databases in postgres-init.sql.
  postgrest-identity-auth:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3001:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/identity_auth?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-identity-auth:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-onboarding-kyc:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3002:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/onboarding_kyc?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-onboarding-kyc:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-aml-kyt:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3003:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/aml_kyt?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-aml-kyt:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-policy-engine:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3004:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/policy_engine?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-policy-engine:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-wallet-management:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3005:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/wallet_management?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-wallet-management:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-treasury:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3006:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/treasury?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-treasury:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-reconciliation:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3007:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/reconciliation?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-reconciliation:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-liquidity:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3008:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/liquidity?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-liquidity:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-audit:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3009:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/audit?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-audit:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-blockchain:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3010:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/blockchain_gateway?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-blockchain:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgrest-transaction-orchestrator:
    image: postgrest/postgrest:v12.2.0
    ports:
      - "3011:3000"
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/transaction_orchestrator?sslmode=disable
      - PGRST_DB_ANON_ROLE=postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://postgrest-transaction-orchestrator:3000
    depends_on:
      postgres:
        condition: service_healthy

  # Shared Redis for velocity counters (policy-risk-engine) and the
  # address-risk cache (aml-kyt-screening).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Shared Kafka broker for the transactional event bus, audit-event-log
  # ingestion, aml-kyt-screening audit sink, blockchain-gateway lifecycle
  # events, exchange-connectors fill/balance events, and treasury-
  # orchestration tx.completed consumption. Runs in KRaft mode (no
  # Zookeeper) with auto-topic creation enabled.
  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 5s
      retries: 15

  # aml-kyt-screening auto-applies migrations on startup via store.Open.
  aml-kyt-screening:
    build: ../aml-kyt-screening
    ports:
      - "8081:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/aml_kyt?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - CHAINALYSIS_WEBHOOK_SECRET=dev-secret-chainalysis
      - TRM_WEBHOOK_SECRET=dev-secret-trm
      - AUDIT_EVENT_BUS_URL=kafka://kafka:9092?topic=kyt.audit.v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build: ../api-gateway
    ports:
      - "8080:8080"

  audit-event-log:
    build: ../audit-event-log
    ports:
      - "8082:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/audit?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=audit.v1
      - PAYLOAD_BUCKET=
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # blockchain-gateway runs on in-memory stores (its Postgres store is not
  # wired into the entrypoint yet), so it needs no database here. Without
  # CHAINS_SUPPORTED it boots with a stub chain adapter — set it plus
  # RPC_URLS_<CHAIN> env overrides to point at a real node.
  blockchain-gateway:
    build: ../blockchain-gateway
    ports:
      - "8083:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/blockchain_gateway?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - WALLET_MGMT_URL=http://wallet-management:8080
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080
      - EVENT_BUS_URL=kafka://kafka:9092?topic=blockchain.events.v1
      - CHAINS_SUPPORTED=${CHAINS_SUPPORTED:-}
      - RPC_URLS_ETHEREUM=${RPC_URLS_ETHEREUM:-}
      - FINALITY_BLOCKS_ETHEREUM=${FINALITY_BLOCKS_ETHEREUM:-64}
    depends_on:
      postgres:
        condition: service_healthy
      wallet-management:
        condition: service_healthy
      kafka:
        condition: service_healthy

  exchange-connectors:
    build: ../exchange-connectors
    ports:
      - "8084:8080"
    environment:
      - DUMMY_PRICE=65000
      - EVENT_BUS_URL=kafka://kafka:9092?topic=recon
    depends_on:
      kafka:
        condition: service_healthy

  fraud-detection:
    build: ../fraud-detection
    ports:
      - "8085:8080"

  fx-hedging:
    build: ../fx-hedging
    ports:
      - "8086:8080"
    environment:
      - DUMMY_FX_RATE=1.10
      - DB_URL=postgres://postgres:postgres@postgres:5432/fx_hedging?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  identity-auth:
    build: ../identity-auth
    ports:
      - "8087:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/identity_auth?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  ledger-accounting:
    build: ../ledger-accounting
    ports:
      - "8088:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/ledger_accounting?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  liquidity-routing:
    build: ../liquidity-routing
    ports:
      - "8089:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/liquidity?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - EXCHANGE_CONNECTORS_TARGET=exchange-connectors:9090
      - EVENT_BUS_URL=kafka://kafka:9092?topic=liquidity.events.v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # CUSTODY_PROVIDER=in_house runs the threshold engine as a single-process
  # t-of-n cluster (default t=2,n=3); DKG, rotation, and key metadata work
  # standalone. SignTx fails closed until POLICY_ENGINE_PUBKEY is configured
  # (the policy engine does not mint decision tokens yet). gRPC is served
  # plaintext on mpc-signing-service:9090 inside the network — mTLS (MTLS_*)
  # is intentionally left off so intra-stack callers need no client certs.
  # For the full 3-node mTLS cluster see the service repo's
  # docker-compose.cluster.yml.
  mpc-signing-service:
    build: ../mpc-signing-service
    ports:
      - "8091:8080"
    environment:
      - CUSTODY_PROVIDER=in_house
      - THRESHOLD_T=2
      - TOTAL_N=3
      - WALLET_MANAGEMENT_URL=http://wallet-management:9090
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080
      - NODE_ID=node-0

  notification:
    build: ../notification
    ports:
      - "8092:8080"
    environment:
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080

  onboarding-kyc:
    build: ../onboarding-kyc
    ports:
      - "8093:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/onboarding_kyc?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  payment-orchestration:
    build: ../payment-orchestration
    ports:
      - "8094:8080"
    environment:
      - WEBHOOK_SECRET=dev-secret
      - RAIL_CONNECTORS_URL=http://rail-connectors:8080

  policy-risk-engine:
    build: ../policy-risk-engine
    ports:
      - "8095:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/policy_engine?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - POLICIES_DIR=/policies
      - MIGRATIONS_DIR=/migrations
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pricing-quote:
    build: ../pricing-quote
    ports:
      - "8096:8080"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  rail-connectors:
    build: ../rail-connectors
    ports:
      - "8097:8080"
    environment:
      - WEBHOOK_SECRET=dev-secret

  reconciliation:
    build: ../reconciliation
    ports:
      - "8098:8080"
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/reconciliation
      - KAFKA_BROKERS=kafka:9092
      - ENABLE_KAFKA=true
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  transaction-orchestrator:
    build: ../transaction-orchestrator
    ports:
      - "8099:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/transaction_orchestrator?sslmode=disable
      - EVENT_BUS_URL=kafka://kafka:9092?topic=transactions
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  treasury-orchestration:
    build: ../treasury-orchestration
    ports:
      - "8100:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/treasury?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - LIQUIDITY_ROUTING_URL=http://liquidity-routing:8080
      - FX_HEDGING_URL=http://fx-hedging:8080
      - WALLET_MGMT_URL=http://wallet-management:8080
      - EVENT_BUS_URL=kafka://kafka:9092?topic=transactions
      - TX_ORCH_EVENT_TOPIC=transactions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # Migrations are applied automatically at startup; the wallet_management
  # database itself must exist (see postgres-init.sql).
  # The XPUB values are dev-only public derivation keys (same vectors as its
  # test suite); production loads them from a secrets store.
  wallet-management:
    build: ../wallet-management
    ports:
      - "8101:8080"  # REST; gRPC (ResolveKeyID, gateway callbacks) is on wallet-management:9090 inside the network
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/wallet_management?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - TREASURY_ORCHESTRATION_URL=http://treasury-orchestration:8080
      - POLICY_RISK_ENGINE_URL=http://policy-risk-engine:8080
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080
      - EVM_XPUB=xpub6CeDpm2b5qtk96oy8yvM572W6cLZSvU5vnpKmKPypbfFwXo86SyT7VtfwWtMZAgZ5eKVMU9NnULt91HBFw9j62wJrcoc1ZRWiNvoorwBRXL
      - BTC_XPUB=xpub6C1HVMz946r433QEjZGpYYWYcspxXXBPys5PBGkmQboRXE6RLfFiStEkKbWKCZaPgDrzZh9nUEunxuiuy6MNdw23du2Ek7GoKYMJVH8eK5E
      - SOL_XPUB=11111111111111111111111111111111
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── UIs — customer-facing and internal consoles ──
  # front-office-ui: Next.js (standalone) on :3000; customer-facing app,
  # talks to the stack through the API Gateway BFF.
  front-office-ui:
    build:
      context: ../front-office-ui
    ports:
      - "8102:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_GATEWAY_URL=http://api-gateway:8080
      - NEXT_PUBLIC_APP_NAME=AI Crypto On-Ramp
      - NEXT_PUBLIC_AUTH_ISSUER=http://identity-auth:8080
      - NEXT_PUBLIC_AUTH_CLIENT_ID=front-office
    depends_on:
      - api-gateway

  # middle-office-ui: Vite SPA served by nginx on :3000; internal
  # compliance/ops console, calls backend services directly via REST.
  middle-office-ui:
    build:
      context: ../middle-office-ui
    ports:
      - "8103:3000"

  # back-office-ui: Streamlit treasury/finance console on :8501.
  # Talks to backend services directly via REST.
  back-office-ui:
    build:
      context: ../back-office-ui
    ports:
      - "8104:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - TREASURY_URL=http://treasury-orchestration:8080
      - LIQUIDITY_URL=http://liquidity-routing:8080
      - FX_HEDGING_URL=http://fx-hedging:8080
      - LEDGER_URL=http://ledger-accounting:8080
      - RECONCILIATION_URL=http://reconciliation:8080
      - WALLET_URL=http://wallet-management:8080
      - PAYMENT_URL=http://payment-orchestration:8080
      - MPC_URL=http://mpc-signing-service:8080

  # ── Gatus — health dashboard, configured via gatus.yml ──
  gatus:
    image: twinproduction/gatus:latest
    ports:
      - "8090:8080"
    volumes:
      - ./gatus.yml:/config/config.yaml:ro
      - gatus-data:/data/

volumes:
  gatus-data:
  pg-data:
