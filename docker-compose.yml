services:
  aml-kyt-screening:
    build: ../aml-kyt-screening
    ports:
      - "8081:8080"

  api-gateway:
    build: ../api-gateway
    ports:
      - "8080:8080"

  audit-event-log:
    build: ../audit-event-log
    ports:
      - "8082:8080"

  blockchain-gateway:
    build: ../blockchain-gateway
    ports:
      - "8083:8080"

  exchange-connectors:
    build: ../exchange-connectors
    ports:
      - "8084:8080"

  fraud-detection:
    build: ../fraud-detection
    ports:
      - "8085:8080"

  fx-hedging:
    build: ../fx-hedging
    ports:
      - "8086:8080"

  identity-auth:
    build: ../identity-auth
    ports:
      - "8087:8080"

  ledger-accounting:
    build: ../ledger-accounting
    ports:
      - "8088:8080"

  liquidity-routing:
    build: ../liquidity-routing
    ports:
      - "8089:8080"

  mpc-signing-service:
    build: ../mpc-signing-service
    ports:
      - "8091:8080"

  notification:
    build: ../notification
    ports:
      - "8092:8080"

  onboarding-kyc:
    build: ../onboarding-kyc
    ports:
      - "8093:8080"

  payment-orchestration:
    build: ../payment-orchestration
    ports:
      - "8094:8080"

  policy-risk-engine:
    build: ../policy-risk-engine
    ports:
      - "8095:8080"

  pricing-quote:
    build: ../pricing-quote
    ports:
      - "8096:8080"

  rail-connectors:
    build: ../rail-connectors
    ports:
      - "8097:8080"

  reconciliation:
    build: ../reconciliation
    ports:
      - "8098:8080"

  transaction-orchestrator:
    build: ../transaction-orchestrator
    ports:
      - "8099:8080"

  treasury-orchestration:
    build: ../treasury-orchestration
    ports:
      - "8100:8080"

  wallet-management:
    build: ../wallet-management
    ports:
      - "8101:8080"

  gatus:
    image: twinproduction/gatus:latest
    ports:
      - "8090:8080"
    volumes:
      - ./gatus.yml:/config/config.yaml:ro
      - gatus-data:/data/

  # ── Kener — status page with per-monitor description/tags/severity ──
  # Auto-seeds 21 monitors on first start via mounted seed file.
  kener:
    image: rajnandan1/kener:latest
    ports:
      - "8200:3000"
    environment:
      KENER_SECRET_KEY: dev-secret-change-me
      ORIGIN: http://localhost:8200
      REDIS_URL: redis://kener-redis:6379
    volumes:
      - kener-data:/app/database
      - ./kener-seed.ts:/app/src/lib/server/db/seedMonitorData.ts:ro
    depends_on:
      - kener-redis
      - aml-kyt-screening

  kener-redis:
    image: redis:7-alpine
    volumes:
      - kener-redis-data:/data

  # ── Uptime Kuma — status page with tags, JSON-query health checks ──
  # Auto-seeds 21 monitors via Socket.io init sidecar.
  # First run: set KUMA_USER/KUMA_PASS, then run seed-uptime-kuma sidecar.
  uptime-kuma:
    image: louislam/uptime-kuma:2
    ports:
      - "8300:3001"
    volumes:
      - uptime-kuma-data:/app/data

  uptime-kuma-seed:
    image: node:20-slim
    depends_on:
      - uptime-kuma
    environment:
      KUMA_URL: http://uptime-kuma:3001
      KUMA_USER: admin
      KUMA_PASS: admin
    volumes:
      - ./seed-uptime-kuma.js:/seed.js:ro
    entrypoint: ["node", "/seed.js"]
    restart: "no"

  # ── Healthchecks.io — heartbeat/push monitoring with description+tags ──
  # Auto-seeds 21 checks via Management API init sidecar.
  # Requires HC_API_KEY from the admin UI (Settings → API Keys).
  healthchecks:
    image: healthchecks/healthchecks:latest
    ports:
      - "8400:8000"
    environment:
      DB: postgres://healthchecks:healthchecks@healthchecks-db:5432/healthchecks
      SECRET_KEY: dev-secret-change-me
      SITE_ROOT: http://localhost:8400
      DEFAULT_FROM_EMAIL: healthchecks@localhost
    depends_on:
      healthchecks-db:
        condition: service_healthy

  healthchecks-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: healthchecks
      POSTGRES_PASSWORD: healthchecks
      POSTGRES_DB: healthchecks
    volumes:
      - healthchecks-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthchecks"]
      interval: 5s
      timeout: 3s
      retries: 5

  healthchecks-seed:
    image: curlimages/curl:latest
    depends_on:
      healthchecks:
        condition: service_started
    environment:
      HC_URL: http://healthchecks:8000
      HC_API_KEY: "${HC_API_KEY:-}"
    volumes:
      - ./seed-healthchecks.sh:/seed.sh:ro
    entrypoint: ["sh", "/seed.sh"]
    restart: "no"

  # ── Cachet — status page with component description/link/group ──
  # Auto-seeds 21 components + 7 groups via API init sidecar.
  # Requires CACHET_TOKEN from the admin UI (Settings → API Keys).
  cachet:
    image: cachethq/docker:latest
    ports:
      - "8500:8000"
    environment:
      DB_DRIVER: pgsql
      DB_HOST: cachet-db
      DB_DATABASE: cachet
      DB_USERNAME: cachet
      DB_PASSWORD: cachet
      APP_KEY: base64:Z3h4SXpWNWNqdWFoNHp5bWRwa2NlYnNkMnQ4ZGJlZWo=
      APP_ENV: local
      APP_DEBUG: false
      CACHE_DRIVER: redis
      REDIS_HOST: cachet-redis
    depends_on:
      cachet-db:
        condition: service_healthy
      cachet-redis:
        condition: service_started

  cachet-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cachet
      POSTGRES_PASSWORD: cachet
      POSTGRES_DB: cachet
    volumes:
      - cachet-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cachet"]
      interval: 5s
      timeout: 3s
      retries: 5

  cachet-redis:
    image: redis:7-alpine

  cachet-seed:
    image: curlimages/curl:latest
    depends_on:
      cachet:
        condition: service_started
    environment:
      CACHET_URL: http://cachet:8000
      CACHET_TOKEN: "${CACHET_TOKEN:-}"
    volumes:
      - ./seed-cachet.sh:/seed.sh:ro
    entrypoint: ["sh", "/seed.sh"]
    restart: "no"

volumes:
  gatus-data:
  kener-data:
  kener-redis-data:
  uptime-kuma-data:
  healthchecks-db-data:
  cachet-db-data: