# yamllint disable rule:line-length
---
services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies identity-auth migrations, then exits.
  identity-auth-migrate:
    build: ../identity-auth
    entrypoint: ["/migrate", "--up"]
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/identity_auth?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot: applies onboarding-kyc migrations, then exits.
  onboarding-kyc-migrate:
    build: ../onboarding-kyc
    entrypoint: ["/migrate", "--up"]
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/onboarding_kyc?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot: applies policy-risk-engine migrations, then exits.
  policy-risk-engine-migrate:
    build: ../policy-risk-engine
    entrypoint: ["/migrate", "up", "/migrations"]
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/policy_engine?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot: applies wallet-management migrations, then exits.
  wallet-management-migrate:
    build: ../wallet-management
    entrypoint: ["/migrate", "-direction", "up"]
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/wallet_management?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # Shared Redis for velocity counters (policy-risk-engine) and the
  # address-risk cache (aml-kyt-screening).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # aml-kyt-screening auto-applies migrations on startup via store.Open, so no
  # separate migrate container is needed.
  aml-kyt-screening:
    build: ../aml-kyt-screening
    ports:
      - "8081:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/aml_kyt?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - CHAINALYSIS_WEBHOOK_SECRET=dev-secret-chainalysis
      - TRM_WEBHOOK_SECRET=dev-secret-trm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build: ../api-gateway
    ports:
      - "8080:8080"

  audit-event-log:
    build: ../audit-event-log
    ports:
      - "8082:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/audit?sslmode=disable
      - KAFKA_BROKERS=
      - KAFKA_TOPIC=audit.v1
      - PAYLOAD_BUCKET=
    depends_on:
      postgres:
        condition: service_healthy

  # blockchain-gateway runs on in-memory stores (its Postgres store is not
  # wired into the entrypoint yet), so it needs no database here. Without
  # CHAINS_SUPPORTED it boots with a stub chain adapter — set it plus
  # RPC_URLS_<CHAIN> env overrides to point at a real node.
  blockchain-gateway:
    build: ../blockchain-gateway
    ports:
      - "8083:8080"
    environment:
      - WALLET_MGMT_URL=http://wallet-management:8080
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080
      - CHAINS_SUPPORTED=${CHAINS_SUPPORTED:-}
      - RPC_URLS_ETHEREUM=${RPC_URLS_ETHEREUM:-}
      - FINALITY_BLOCKS_ETHEREUM=${FINALITY_BLOCKS_ETHEREUM:-64}
    depends_on:
      wallet-management:
        condition: service_healthy

  exchange-connectors:
    build: ../exchange-connectors
    ports:
      - "8084:8080"
    environment:
      - DUMMY_PRICE=65000

  fraud-detection:
    build: ../fraud-detection
    ports:
      - "8085:8080"

  fx-hedging:
    build: ../fx-hedging
    ports:
      - "8086:8080"
    environment:
      - DUMMY_FX_RATE=1.10

  identity-auth:
    build: ../identity-auth
    ports:
      - "8087:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/identity_auth?sslmode=disable
    depends_on:
      identity-auth-migrate:
        condition: service_completed_successfully

  ledger-accounting:
    build: ../ledger-accounting
    ports:
      - "8088:8080"

  liquidity-routing:
    build: ../liquidity-routing
    ports:
      - "8089:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/liquidity?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - EXCHANGE_CONNECTORS_TARGET=exchange-connectors:9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # CUSTODY_PROVIDER=in_house runs the threshold engine as a single-process
  # t-of-n cluster (default t=2,n=3); DKG, rotation, and key metadata work
  # standalone. SignTx fails closed until POLICY_ENGINE_PUBKEY is configured
  # (the policy engine does not mint decision tokens yet). gRPC is served
  # plaintext on mpc-signing-service:9090 inside the network — mTLS (MTLS_*)
  # is intentionally left off so intra-stack callers need no client certs.
  # For the full 3-node mTLS cluster see the service repo's
  # docker-compose.cluster.yml.
  mpc-signing-service:
    build: ../mpc-signing-service
    ports:
      - "8091:8080"
    environment:
      - CUSTODY_PROVIDER=in_house
      - THRESHOLD_T=2
      - TOTAL_N=3
      - WALLET_MANAGEMENT_URL=http://wallet-management:9090
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080
      - NODE_ID=node-0

  notification:
    build: ../notification
    ports:
      - "8092:8080"
    environment:
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080

  onboarding-kyc:
    build: ../onboarding-kyc
    ports:
      - "8093:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/onboarding_kyc?sslmode=disable
    depends_on:
      onboarding-kyc-migrate:
        condition: service_completed_successfully

  payment-orchestration:
    build: ../payment-orchestration
    ports:
      - "8094:8080"
    environment:
      - WEBHOOK_SECRET=dev-secret
      - RAIL_CONNECTORS_URL=http://rail-connectors:8080

  policy-risk-engine:
    build: ../policy-risk-engine
    ports:
      - "8095:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/policy_engine?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - POLICIES_DIR=/policies
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      policy-risk-engine-migrate:
        condition: service_completed_successfully

  pricing-quote:
    build: ../pricing-quote
    ports:
      - "8096:8080"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  rail-connectors:
    build: ../rail-connectors
    ports:
      - "8097:8080"
    environment:
      - WEBHOOK_SECRET=dev-secret

  reconciliation:
    build: ../reconciliation
    ports:
      - "8098:8080"
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/reconciliation
      - KAFKA_BROKERS=
      - ENABLE_KAFKA=false
    depends_on:
      postgres:
        condition: service_healthy

  transaction-orchestrator:
    build: ../transaction-orchestrator
    ports:
      - "8099:8080"
    environment:
      - EVENT_BUS_URL=nats://localhost:4222

  treasury-orchestration:
    build: ../treasury-orchestration
    ports:
      - "8100:8080"
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/treasury?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - LIQUIDITY_ROUTING_URL=http://liquidity-routing:8080
      - FX_HEDGING_URL=http://fx-hedging:8080
      - WALLET_MGMT_URL=http://wallet-management:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Migrations are applied by the wallet-management-migrate one-shot above;
  # the wallet_management database itself must exist (see postgres-init.sql).
  # The XPUB values are dev-only public derivation keys (same vectors as its
  # test suite); production loads them from a secrets store.
  wallet-management:
    build: ../wallet-management
    ports:
      - "8101:8080"  # REST; gRPC (ResolveKeyID, gateway callbacks) is on wallet-management:9090 inside the network
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/wallet_management?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - TREASURY_ORCHESTRATION_URL=http://treasury-orchestration:8080
      - POLICY_RISK_ENGINE_URL=http://policy-risk-engine:8080
      - AUDIT_EVENT_LOG_URL=http://audit-event-log:8080
      - EVM_XPUB=xpub6CeDpm2b5qtk96oy8yvM572W6cLZSvU5vnpKmKPypbfFwXo86SyT7VtfwWtMZAgZ5eKVMU9NnULt91HBFw9j62wJrcoc1ZRWiNvoorwBRXL
      - BTC_XPUB=xpub6C1HVMz946r433QEjZGpYYWYcspxXXBPys5PBGkmQboRXE6RLfFiStEkKbWKCZaPgDrzZh9nUEunxuiuy6MNdw23du2Ek7GoKYMJVH8eK5E
      - SOL_XPUB=11111111111111111111111111111111
    depends_on:
      redis:
        condition: service_healthy
      wallet-management-migrate:
        condition: service_completed_successfully

  # ── Gatus — health dashboard, configured via gatus.yml ──
  gatus:
    image: twinproduction/gatus:latest
    ports:
      - "8090:8080"
    volumes:
      - ./gatus.yml:/config/config.yaml:ro
      - gatus-data:/data/

volumes:
  gatus-data:
  pg-data:
