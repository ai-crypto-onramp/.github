# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - default
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Read-only HTTP layers over Postgres so Hurl E2E tests can assert on
  # data produced by the services. Each instance is published on a unique
  # host port (3000+i) so host-side Hurl can reach it; the internal name
  # is postgrest-<db>:3000. Add/remove instances in lockstep with the
  # databases in postgres-init.sql.
