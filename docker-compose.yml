  # Shared Redis for velocity counters (policy-risk-engine) and the
  # address-risk cache (aml-kyt-screening).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - default
      - monitoring
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Shared Kafka broker for the transactional event bus, audit-event-log
  # ingestion, aml-kyt-screening audit sink, blockchain-gateway lifecycle
  # events, exchange-connectors fill/balance events, and treasury-
  # orchestration tx.completed consumption. Runs in KRaft combined mode
  # (no Zookeeper) with auto-topic creation enabled.
  kafka:
    image: apache/kafka:latest
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_RETENTION_MS=86400000
      - KAFKA_LOG_RETENTION_HOURS=24
    ports:
      - "9092:9092"
    networks:
      - default
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 5s
      retries: 15

  # Confluent REST Proxy — HTTP bridge over Kafka so Hurl E2E tests can
  # assert on topic contents the same way the postgrest-* services assert
  # on DB rows. Published on host port 8105 (internal kafka-rest:8082).
  # kafka-rest:
  #   image: confluentinc/cp-kafka-rest:7.7.0
  #   ports:
  #     - "8105:8082"
  #   environment:
  #     - KAFKA_REST_BOOTSTRAP_SERVERS=kafka:9092
  #     - KAFKA_REST_LISTENERS=http://0.0.0.0:8082
  #     - KAFKA_REST_HOST_NAME=kafka-rest
  #     - KAFKA_REST_ACCESS_CONTROL_ALLOW_ORIGIN=*
  #   depends_on:
  #     kafka:
  #       condition: service_healthy

  # ── Observability stack: Prometheus + Grafana + Loki + Tempo + OTel
  # collector. Services export OTLP traces/metrics/logs to the collector,
  # which fans out to Tempo (traces), Prometheus (metrics, scraped on
  # :8888), and Loki (logs). Prometheus also scrapes each service's
  # /metrics endpoint directly for the legacy Prometheus exposition
  # format. Grafana is provisioned with all three datasources. ──
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    networks:
      - monitoring
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - monitoring
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki

  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - monitoring
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    networks:
      - monitoring
    command: --config=/etc/otelcol/config.yaml
    volumes:
      - ./monitoring/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - tempo
      - loki
      - prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - monitoring
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # aml-kyt-screening auto-applies migrations on startup via store.Open.
  aml-kyt-screening:
    build: ../aml-kyt-screening
    ports:
      - "8081:8080"
    expose:
      - "9090"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/aml_kyt?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - CHAINALYSIS_WEBHOOK_SECRET=dev-secret-chainalysis
      - TRM_WEBHOOK_SECRET=dev-secret-trm
      - AUDIT_EVENT_BUS_URL=kafka://kafka:9092?topic=audit.v1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=aml-kyt-screening
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build: ../api-gateway
    ports:
      - "8080:8080"
    networks:
      - default
      - monitoring
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=api-gateway
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev

  audit-event-log:
    build: ../audit-event-log
    ports:
      - "8082:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/audit?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=audit.v1
      - PAYLOAD_BUCKET=
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=audit-event-log
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # blockchain-gateway persists broadcasts, confirmations, fees, reorgs, and
  # outbox events to Postgres (DB_URL). Without CHAINS_SUPPORTED it boots with
  # a stub chain adapter — set it plus RPC_URLS_<CHAIN> env overrides to
  # point at a real node.
  blockchain-gateway:
    build: ../blockchain-gateway
    ports:
      - "8083:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/blockchain_gateway?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - WALLET_MGMT_URL=http://wallet-management:8080
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - EVENT_BUS_URL=kafka://kafka:9092?topic=blockchain.events.v1
      - CHAINS_SUPPORTED=${CHAINS_SUPPORTED:-}
      - RPC_URLS_ETHEREUM=${RPC_URLS_ETHEREUM:-}
      - FINALITY_BLOCKS_ETHEREUM=${FINALITY_BLOCKS_ETHEREUM:-64}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=blockchain-gateway
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      wallet-management:
        condition: service_healthy
      kafka:
        condition: service_healthy

  exchange-connectors:
    build: ../exchange-connectors
    ports:
      - "8084:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/exchange_connectors?sslmode=disable
      - DUMMY_PRICE=65000
      - EVENT_BUS_URL=kafka://kafka:9092?topic=recon
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=exchange-connectors
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fraud-detection:
    build: ../fraud-detection
    ports:
      - "8085:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/fraud?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=fraud-detection
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fx-hedging:
    build: ../fx-hedging
    ports:
      - "8086:8080"
    networks:
      - default
      - monitoring
    environment:
      - DUMMY_FX_RATE=1.10
      - DB_URL=postgres://postgres:postgres@postgres:5432/fx_hedging?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=fx-hedging
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  identity-auth:
    build: ../identity-auth
    ports:
      - "8087:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/identity_auth?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=identity-auth
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy

  ledger-accounting:
    build: ../ledger-accounting
    ports:
      - "8088:8080"
    expose:
      - "8081"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/ledger_accounting?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      # Shared HS256 secret for service-token JWT auth on internal REST
      # endpoints. Override in real deployments via a secrets mount.
      - SERVICE_TOKEN_SECRET=dev-internal-shared-secret
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=ledger-accounting
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  liquidity-routing:
    build: ../liquidity-routing
    ports:
      - "8089:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/liquidity?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - EXCHANGE_CONNECTORS_TARGET=exchange-connectors:9090
      - EVENT_BUS_URL=kafka://kafka:9092?topic=liquidity.fills
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=liquidity-routing
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # CUSTODY_PROVIDER=in_house runs the threshold engine as a single-process
  # t-of-n cluster (default t=2,n=3); DKG, rotation, and key metadata work
  # standalone. SignTx fails closed until POLICY_ENGINE_PUBKEY is configured
  # (the policy engine does not mint decision tokens yet). gRPC is served
  # with mTLS when /certs is populated (TLS_CERT_FILE/KEY/CA); otherwise it
  # falls back to plaintext inside the network when DEV_MODE=1.
  # Operator must provision /certs via a secrets mount or
  # `mpc-signing-service/scripts/gen-certs.sh`; the compose file does not
  # generate certs. Uncomment the TLS_* env vars and the volume mount to
  # enable mTLS.
  # For the full 3-node mTLS cluster see the service repo's
  # docker-compose.cluster.yml.
  mpc-signing-service:
    build: ../mpc-signing-service
    ports:
      - "8091:8080"
    expose:
      - "9090"
    networks:
      - default
      - monitoring
    environment:
      - CUSTODY_PROVIDER=in_house
      - THRESHOLD_T=2
      - TOTAL_N=3
      - WALLET_MANAGEMENT_URL=http://wallet-management:9090
      - KAFKA_BROKERS=kafka:9092
      - NODE_ID=node-0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=mpc-signing-service
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
      # mTLS for the gRPC port. The /certs mount is read-only; provision the
      # CA + server cert/key out-of-band (e.g. scripts/gen-certs.sh or a
      # secrets mount). When all three are unset, DEV_MODE=1 allows
      # plaintext; in prod the service refuses to start without them.
      # - TLS_CERT_FILE=/certs/mpc-signing-service.crt
      # - TLS_KEY_FILE=/certs/mpc-signing-service.key
      # - TLS_CA_FILE=/certs/internal-ca.crt
    # volumes:
    #   - internal-certs:/certs:ro
    depends_on:
      kafka:
        condition: service_healthy

  notification:
    build: ../notification
    ports:
      - "8092:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/notification?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=notification
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  onboarding-kyc:
    build: ../onboarding-kyc
    ports:
      - "8093:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/onboarding_kyc?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=onboarding-kyc
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-orchestration:
    build: ../payment-orchestration
    ports:
      - "8094:8080"
    networks:
      - default
      - monitoring
    environment:
      - WEBHOOK_SECRET=dev-secret
      - RAIL_CONNECTORS_URL=http://rail-connectors:8080
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      # Shared HS256 secret for service-token JWT auth on internal REST
      # endpoints. Override in real deployments via a secrets mount.
      - SERVICE_TOKEN_SECRET=dev-internal-shared-secret
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=payment-orchestration
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      kafka:
        condition: service_healthy

  policy-risk-engine:
    build: ../policy-risk-engine
    ports:
      - "8095:8080"
    expose:
      - "9090"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/policy_engine?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - POLICIES_DIR=/policies
      - MIGRATIONS_DIR=/migrations
      - PORT=8080
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=policy-risk-engine
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  pricing-quote:
    build: ../pricing-quote
    ports:
      - "8096:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/pricing_quote?sslmode=disable
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/pricing_quote?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=pricing-quote
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  rail-connectors:
    build: ../rail-connectors
    ports:
      - "8097:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/rail_connectors?sslmode=disable
      - WEBHOOK_SECRET=dev-secret
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=rail-connectors
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy

  reconciliation:
    build: ../reconciliation
    ports:
      - "8098:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/reconciliation
      - KAFKA_BROKERS=kafka:9092
      - ENABLE_KAFKA=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=reconciliation
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  transaction-orchestrator:
    build: ../transaction-orchestrator
    ports:
      - "8099:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/transaction_orchestrator?sslmode=disable
      - EVENT_BUS_URL=kafka://kafka:9092?topic=transactions
      - POLICY_URL=policy-risk-engine:9090
      - KYT_URL=aml-kyt-screening:9090
      - MPC_URL=mpc-signing-service:9090
      - LEDGER_URL=ledger-accounting:8081
      - PAYMENT_URL=http://payment-orchestration:8080
      - BLOCKCHAIN_URL=http://blockchain-gateway:8080
      - ENABLE_STUB_PARTNERS=0
      # Shared HS256 secret for service-token JWT auth on internal REST
      # endpoints. Override in real deployments via a secrets mount.
      - SERVICE_TOKEN_SECRET=dev-internal-shared-secret
      # mTLS material for the txo→partner gRPC dials. When all three are
      # unset, the dials fall back to plaintext (allowed only with DEV_MODE=1
      # or ENABLE_STUB_PARTNERS=1). Uncomment and mount /certs to enable.
      # - TLS_CERT_FILE=/certs/transaction-orchestrator.crt
      # - TLS_KEY_FILE=/certs/transaction-orchestrator.key
      # - TLS_CA_FILE=/certs/internal-ca.crt
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=transaction-orchestrator
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    # volumes:
    #   - internal-certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      policy-risk-engine:
        condition: service_started
      aml-kyt-screening:
        condition: service_started
      mpc-signing-service:
        condition: service_started
      ledger-accounting:
        condition: service_started
      payment-orchestration:
        condition: service_started
      blockchain-gateway:
        condition: service_started

  treasury-orchestration:
    build: ../treasury-orchestration
    ports:
      - "8100:8080"
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/treasury?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - LIQUIDITY_ROUTING_URL=http://liquidity-routing:8080
      - FX_HEDGING_URL=http://fx-hedging:8080
      - WALLET_MGMT_URL=http://wallet-management:8080
      - EVENT_BUS_URL=kafka://kafka:9092?topic=transactions
      - TX_ORCH_EVENT_TOPIC=transactions
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=treasury-orchestration
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # Migrations are applied automatically at startup; the wallet_management
  # database itself must exist (see postgres-init.sql).
  # The XPUB values are dev-only public derivation keys (same vectors as its
  # test suite); production loads them from a secrets store.
  wallet-management:
    build: ../wallet-management
    ports:
      - "8101:8080"  # REST; gRPC (ResolveKeyID, gateway callbacks) is on wallet-management:9090 inside the network
    networks:
      - default
      - monitoring
    environment:
      - DB_URL=postgres://postgres:postgres@postgres:5432/wallet_management?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - TREASURY_ORCHESTRATION_URL=http://treasury-orchestration:8080
      - POLICY_RISK_ENGINE_URL=http://policy-risk-engine:8080
      - KAFKA_BROKERS=kafka:9092
      - DEV_MODE=1
      - EVM_XPUB=xpub6CeDpm2b5qtk96oy8yvM572W6cLZSvU5vnpKmKPypbfFwXo86SyT7VtfwWtMZAgZ5eKVMU9NnULt91HBFw9j62wJrcoc1ZRWiNvoorwBRXL
      - BTC_XPUB=xpub6C1HVMz946r433QEjZGpYYWYcspxXXBPys5PBGkmQboRXE6RLfFiStEkKbWKCZaPgDrzZh9nUEunxuiuy6MNdw23du2Ek7GoKYMJVH8eK5E
      - SOL_XPUB=11111111111111111111111111111111
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=wallet-management
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ai-crypto-onramp,deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── UIs — customer-facing and internal consoles ──
  # front-office-ui: Next.js (standalone) on :3000; customer-facing app,
  # talks to the stack through the API Gateway BFF.
  front-office-ui:
    build:
      context: ../front-office-ui
    ports:
      - "8102:3000"
    networks:
      - default
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_GATEWAY_URL=http://api-gateway:8080
      - NEXT_PUBLIC_APP_NAME=AI Crypto On-Ramp
      - NEXT_PUBLIC_AUTH_ISSUER=http://identity-auth:8080
      - NEXT_PUBLIC_AUTH_CLIENT_ID=front-office
    depends_on:
      - api-gateway

  # middle-office-ui: Vite SPA served by nginx on :3000; internal
  # compliance/ops console, calls backend services directly via REST.
  middle-office-ui:
    build:
      context: ../middle-office-ui
    ports:
      - "8103:3000"
    networks:
      - default

  # back-office-ui: Streamlit treasury/finance console on :8501.
  # Talks to backend services directly via REST.
  back-office-ui:
    build:
      context: ../back-office-ui
    ports:
      - "8104:8501"
    networks:
      - default
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - TREASURY_URL=http://treasury-orchestration:8080
      - LIQUIDITY_URL=http://liquidity-routing:8080
      - FX_HEDGING_URL=http://fx-hedging:8080
      - LEDGER_URL=http://ledger-accounting:8080
      - RECONCILIATION_URL=http://reconciliation:8080
      - WALLET_URL=http://wallet-management:8080
      - PAYMENT_URL=http://payment-orchestration:8080
      - MPC_URL=http://mpc-signing-service:8080

  # ── Gatus — health dashboard, configured via gatus.yml ──
  gatus:
    image: twinproduction/gatus:latest
    ports:
      - "8090:8080"
    networks:
      - default
      - monitoring
    volumes:
      - ./gatus.yml:/config/config.yaml:ro
      - gatus-data:/data/

networks:
  monitoring:
    driver: bridge

volumes:
  gatus-data:
  pg-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
  # Internal mTLS material (CA + per-service cert/key). Populate out-of-band
  # via a secrets mount or `mpc-signing-service/scripts/gen-certs.sh`; the
  # compose file does not generate certs. Mount read-only at /certs in the
  # services that opt into mTLS (mpc-signing-service, transaction-orchestrator).
  internal-certs:
