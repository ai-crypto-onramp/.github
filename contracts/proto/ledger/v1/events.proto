syntax = "proto3";

package ledger.v1;

option go_package = "github.com/ai-crypto-onramp/contracts/gen/go/ledger/v1;ledgerpb";

// Version: v1
// Breaking-change policy: minor field additions only; bump to v2 for removals/renames.

// LedgerEvent is the envelope published by ledger-accounting to the
// `ledger.events.v1` Kafka topic. The reconciliation service consumes this
// topic to match ledger postings against external settlement/fill events.
//
// STATUS: the ledger-accounting service does not yet publish to Kafka (see
// PRODUCTION_READINESS_REPORT.md P0 #8). This is the canonical event shape
// the producer MUST emit once wired.
message LedgerEvent {
  string schema_version = 1;   // "1"
  string event_id = 2;         // UUID, idempotency key
  string event_type = 3;       // "posting.committed" | "posting.reversed"
  string posting_id = 4;
  string ref_tx_id = 5;        // optional saga correlation
  string hash_head = 6;        // hash-chain head after this posting
  string emitted_at = 7;       // RFC3339
  repeated LedgerEntry entries = 8;
}

message LedgerEntry {
  string entry_id = 1;
  string account_id = 2;
  string direction = 3;   // "debit" | "credit"
  uint64 amount = 4;       // minor units
  string asset = 5;
}