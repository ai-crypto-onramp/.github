# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
storage:
  type: sqlite
  path: /data/data.db

ui:
  title: AI Crypto On-Ramp — Health
  header: AI Crypto On-Ramp Status

alerting:
  slack: {}

metrics: true

endpoints:
  - name: postgres
    group: infra
    url: tcp://postgres:5432
    interval: 30s
    conditions:
      - "[CONNECTED] == true"

  - name: redis
    group: infra
    url: tcp://redis:6379
    interval: 30s
    conditions:
      - "[CONNECTED] == true"

  - name: kafka
    group: infra
    url: tcp://kafka:9092
    interval: 30s
    conditions:
      - "[CONNECTED] == true"

  - name: kafka-rest
    group: infra
    url: http://kafka-rest:8082/topics
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  - name: aml-kyt-screening
    group: core
    url: http://aml-kyt-screening:8080/healthz
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: api-gateway
    group: edge
    url: http://api-gateway:8080/healthz
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"

  - name: audit-event-log
    group: core
    url: http://audit-event-log:8080/healthz
